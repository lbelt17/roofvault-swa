<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>RRC Practice Exam</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg-page: #f5f7fb;
      --bg-subtle: #eef1f6;
      --card: #ffffff;
      --border: rgba(15, 23, 42, 0.10);
      --border-strong: rgba(15, 23, 42, 0.14);
      --text: #0b0d12;
      --muted: #5b6b82;
      --accent-blue-soft: rgba(33, 179, 255, 0.12);
      --accent-purple-soft: rgba(104, 64, 255, 0.10);
      --shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 4px 14px rgba(15, 23, 42, 0.06);
      --radius-xl: 22px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      background:
        radial-gradient(1200px 800px at 25% 0%, var(--accent-blue-soft), transparent 60%),
        radial-gradient(900px 700px at 70% 10%, var(--accent-purple-soft), transparent 62%),
        var(--bg-page);
      padding: 48px 16px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .shell {
      width: min(780px, 100%);
      padding: 26px;
      border-radius: var(--radius-xl);
      background: var(--card);
      border: 1px solid var(--border-strong);
      box-shadow: var(--shadow);
    }

    .module-top {
      text-align: center;
      margin-bottom: 18px;
    }

    .module-title {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 760;
      letter-spacing: -0.02em;
    }

    .module-sub {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
    }

    .controls-row {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    button#btnStartRrcExam {
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.96);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.06)),
        linear-gradient(135deg, #2cc3ff, #1679ff);
      box-shadow: 0 12px 28px rgba(22, 121, 255, 0.32);
      min-width: 280px;
    }

    button#btnStartRrcExam:hover:not(:disabled) {
      filter: brightness(1.03);
    }

    button#btnStartRrcExam:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    #examStatus {
      display: none;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    #examStatus.visible { display: block; }

    #examError {
      display: none;
      text-align: center;
      font-size: 14px;
      color: #b91c1c;
      background: #fef2f2;
      border: 1px solid rgba(220, 38, 38, 0.22);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    #examError.visible { display: block; }

    #qList {
      background: var(--bg-subtle);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-strong);
      padding: 12px;
      min-height: 240px;
      max-height: 62vh;
      overflow: auto;
      font-size: 15px;
      line-height: 1.5;
    }

    .q-empty {
      color: var(--muted);
      font-size: 15px;
      text-align: center;
      padding: 24px 12px;
    }

    .q-empty strong { color: var(--text); }
  </style>
</head>
<body>
  <main class="shell">
    <div class="module-top">
      <h1 class="module-title">RRC Practice Exam</h1>
      <p class="module-sub">25 randomized questions from the RRC Study Guide bank.</p>
    </div>

    <div class="controls-row">
      <button id="btnStartRrcExam" type="button">Start RRC Exam (25 Questions)</button>
    </div>

    <div id="examStatus" aria-live="polite"></div>
    <div id="examError" role="alert"></div>

    <div id="qList" aria-label="questions">
      <div class="q-empty">
        Click <strong>Start RRC Exam (25 Questions)</strong> to begin.
      </div>
    </div>
  </main>

  <script src="/interactive-exam.js?v=4"></script>
  <script src="/michael-exam.js?v=1"></script>
</body>
</html>
