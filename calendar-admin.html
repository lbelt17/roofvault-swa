<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RoofVault · Calendar Admin</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --card-bg: #ffffff;
      --border: #e1e4ea;
      --text: #111827;
      --muted: #555f73;
      --accent: #2563eb;
      --success: #15803d;
      --danger: #b91c1c;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px 16px 40px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .title h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: -0.01em;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: var(--muted);
      font-size: 15px;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
    }
    .back:hover {
      color: var(--text);
      border-color: var(--border);
      background: #ffffff;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 18px 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.07);
      margin-bottom: 14px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing: -0.01em;
    }

    .muted { color: var(--muted); font-size: 15px; margin: 0; }

    .filters {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      background: #f3f4f6;
      border: 1px solid var(--border);
      border-radius: 999px;
      margin-bottom: 14px;
    }

    .filter-btn {
      padding: 9px 16px;
      font-size: 15px;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      border: none;
      border-radius: 999px;
      cursor: pointer;
    }
    .filter-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 6px rgba(37, 99, 235, 0.25);
    }

    .events {
      display: grid;
      gap: 14px;
    }

    .event-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      padding: 14px 14px 15px;
    }

    .event-title {
      margin: 0 0 6px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .event-meta {
      margin: 0 0 8px;
      font-size: 15px;
      color: var(--muted);
      line-height: 1.5;
    }

    .event-desc {
      margin: 0 0 12px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text);
    }

    .event-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: opacity 0.15s ease, transform 0.05s ease;
    }
    .btn:disabled { opacity: 0.5; cursor: wait; }
    .btn:active { transform: translateY(1px); }

    .btn-approve {
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: #fff;
      border-color: #16a34a;
      box-shadow: 0 4px 10px rgba(22, 163, 74, 0.25);
    }
    .btn-decline {
      background: #fff;
      color: var(--danger);
      border-color: rgba(185, 28, 28, 0.35);
    }
    .btn-decline:hover { background: rgba(239, 68, 68, 0.08); }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 8px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .badge.pending { background: rgba(250, 204, 21, 0.18); color: #854d0e; }
    .badge.approved { background: rgba(34, 197, 94, 0.15); color: #15803d; }
    .badge.declined { background: rgba(239, 68, 68, 0.15); color: #b91c1c; }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      display: none;
      z-index: 1000;
    }
    .toast.visible { display: block; }
    .toast.success { background: #16a34a; color: #fff; }
    .toast.error { background: #dc2626; color: #fff; }

    .gate {
      max-width: 520px;
      margin: 80px auto;
      text-align: center;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
    }
    .gate h2 { margin: 0 0 10px; font-size: 22px; }
    .gate p { color: var(--muted); margin: 0 0 16px; font-size: 15px; line-height: 1.55; }
    .gate a {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
    }

    @media (max-width: 680px) {
      body { padding: 16px 10px 30px; }
      .title h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="wrap" id="appWrap" style="display:none">
    <div class="header">
      <div class="title"><h1>Calendar Admin</h1></div>
      <a class="back" href="/index.html">← Back</a>
    </div>

    <section class="card">
      <h2>Event Moderation</h2>
      <div class="filters" role="tablist" aria-label="Filter events">
        <button type="button" class="filter-btn active" data-status="pending" role="tab">Pending</button>
        <button type="button" class="filter-btn" data-status="approved" role="tab">Approved</button>
        <button type="button" class="filter-btn" data-status="declined" role="tab">Declined</button>
      </div>

      <div class="events" id="eventsList">
        <p class="muted" id="eventsStatus">Loading events…</p>
      </div>
    </section>
  </div>

  <div class="gate" id="gate" style="display:none">
    <h2>Admin Access Required</h2>
    <p id="gateMessage">You need to be signed in as an owner to use this page.</p>
    <a id="gateAction" href="/.auth/login/aad?post_login_redirect_uri=/calendar-admin.html">Sign In</a>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="/auth.js"></script>
  <script>
    (function () {
      var OWNER_EMAILS = ["labelt.cid@gmail.com"];
      var currentStatus = "pending";
      var appWrap = document.getElementById("appWrap");
      var gate = document.getElementById("gate");
      var gateMessage = document.getElementById("gateMessage");
      var gateAction = document.getElementById("gateAction");
      var listEl = document.getElementById("eventsList");
      var toastEl = document.getElementById("toast");
      var filterBtns = document.querySelectorAll(".filter-btn");

      function esc(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
      }

      function parseDateParts(iso) {
        if (!iso) return null;
        var m = /^(\d{4})-(\d{2})-(\d{2})/.exec(String(iso));
        if (!m) return null;
        return { y: +m[1], m: +m[2], d: +m[3] };
      }

      function formatPretty(iso) {
        var p = parseDateParts(iso);
        if (!p) return iso || "";
        var dt = new Date(p.y, p.m - 1, p.d);
        return dt.toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" });
      }

      function formatTime(t) {
        if (!t) return "";
        var m = /^(\d{1,2}):(\d{2})/.exec(String(t));
        if (!m) return String(t);
        var h = parseInt(m[1], 10);
        var min = m[2];
        if (isNaN(h)) return String(t);
        var suffix = h >= 12 ? "PM" : "AM";
        var h12 = h % 12;
        if (h12 === 0) h12 = 12;
        return h12 + ":" + min + " " + suffix;
      }

      function formatCreatedAt(iso) {
        if (!iso) return "";
        try {
          var d = new Date(iso);
          if (isNaN(d.getTime())) return "";
          return d.toLocaleString();
        } catch (e) { return ""; }
      }

      function showToast(kind, message) {
        toastEl.textContent = message;
        toastEl.className = "toast visible " + kind;
        setTimeout(function () { toastEl.className = "toast"; }, 3200);
      }

      function renderEvents(events) {
        if (!events || events.length === 0) {
          listEl.innerHTML = '<p class="muted">No ' + esc(currentStatus) + ' events.</p>';
          return;
        }
        var html = "";
        for (var i = 0; i < events.length; i++) {
          var ev = events[i];
          var pretty = formatPretty(ev.date);
          var timePretty = formatTime(ev.time);
          var when = timePretty ? (pretty + " · " + timePretty) : (pretty || "No date");
          var parts = [when];
          if (ev.organization) parts.push(esc(ev.organization));
          var meta = parts.join(" · ");
          var created = formatCreatedAt(ev.createdAt);

          html += '<div class="event-item" data-id="' + esc(ev.id) + '" data-pk="' + esc(ev.partitionKey || "") + '">';
          html += '<h3 class="event-title">' + esc(ev.name || "(Untitled event)") + '<span class="badge ' + esc(ev.status || "pending") + '">' + esc(ev.status || "pending") + '</span></h3>';
          html += '<p class="event-meta">' + meta + (created ? ' · submitted ' + esc(created) : '') + '</p>';
          if (ev.description) {
            html += '<p class="event-desc">' + esc(ev.description) + '</p>';
          }
          html += '<div class="event-actions">';
          if (ev.status !== "approved") {
            html += '<button class="btn btn-approve" data-action="approved">Approve</button>';
          }
          if (ev.status !== "declined") {
            html += '<button class="btn btn-decline" data-action="declined">Decline</button>';
          }
          html += '</div>';
          html += '</div>';
        }
        listEl.innerHTML = html;

        var cards = listEl.querySelectorAll(".event-item");
        cards.forEach(function (card) {
          var id = card.getAttribute("data-id");
          var pk = card.getAttribute("data-pk");
          card.querySelectorAll("button[data-action]").forEach(function (btn) {
            btn.addEventListener("click", function () {
              updateStatus(card, id, pk, btn.getAttribute("data-action"), card.querySelectorAll("button[data-action]"));
            });
          });
        });
      }

      async function loadEvents() {
        listEl.innerHTML = '<p class="muted">Loading events…</p>';
        try {
          var res = await fetch("/api/calendar-admin-events?status=" + encodeURIComponent(currentStatus), {
            credentials: "include",
            headers: { "Accept": "application/json" }
          });
          if (res.status === 401 || res.status === 403) {
            showGate(res.status);
            return;
          }
          var data = await res.json();
          if (!res.ok || !data.ok) {
            listEl.innerHTML = '<p class="muted">Could not load events: ' + esc((data && data.error) || ("HTTP " + res.status)) + '</p>';
            return;
          }
          renderEvents(data.events || []);
        } catch (err) {
          listEl.innerHTML = '<p class="muted">Could not load events. Please try again.</p>';
        }
      }

      async function updateStatus(cardEl, id, partitionKey, newStatus, buttons) {
        buttons.forEach(function (b) { b.disabled = true; });
        try {
          var res = await fetch("/api/calendar-admin-update", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: id, partitionKey: partitionKey || undefined, status: newStatus })
          });
          var data = await res.json();
          if (!res.ok || !data.ok) {
            showToast("error", "Update failed: " + ((data && data.error) || ("HTTP " + res.status)));
            buttons.forEach(function (b) { b.disabled = false; });
            return;
          }
          showToast("success", newStatus === "approved" ? "Event approved." : "Event declined.");
          cardEl.style.opacity = "0.4";
          setTimeout(loadEvents, 300);
        } catch (err) {
          showToast("error", "Network error. Please try again.");
          buttons.forEach(function (b) { b.disabled = false; });
        }
      }

      function showGate(statusCode) {
        appWrap.style.display = "none";
        gate.style.display = "";
        if (statusCode === 403) {
          gateMessage.textContent = "Your account does not have permission to view this page.";
          gateAction.textContent = "Back to Home";
          gateAction.setAttribute("href", "/index.html");
        } else {
          gateMessage.textContent = "Please sign in to view calendar admin.";
          gateAction.textContent = "Sign In";
          gateAction.setAttribute("href", "/.auth/login/aad?post_login_redirect_uri=/calendar-admin.html");
        }
      }

      filterBtns.forEach(function (btn) {
        btn.addEventListener("click", function () {
          filterBtns.forEach(function (b) {
            b.classList.toggle("active", b === btn);
            b.setAttribute("aria-selected", b === btn ? "true" : "false");
          });
          currentStatus = btn.getAttribute("data-status") || "pending";
          loadEvents();
        });
      });

      document.addEventListener("DOMContentLoaded", async function () {
        try {
          var auth = await window.getAuthState(true);
          if (!auth || !auth.isAuthenticated) {
            showGate(401);
            return;
          }
          var email = (auth.userDetails || "").toLowerCase();
          if (OWNER_EMAILS.indexOf(email) === -1) {
            showGate(403);
            return;
          }
          appWrap.style.display = "";
          loadEvents();
        } catch (err) {
          showGate(401);
        }
      });
    })();
  </script>
</body>
</html>
